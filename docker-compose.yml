version: '3.8'

services:

  median:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: median
    restart: unless-stopped
    env_file: .env
    environment:
      - UPLOAD_FOLDER=/app/downloads
      - BACKUP_FOLDER=/app/backups
      - WATCHED_FOLDER=/app/watched
      - LOG_FOLDER=/app/logs
      - DATABASE_PATH=/app/database/median.db
    volumes:
      - median_downloads:/app/downloads
      - median_backups:/app/backups
      - median_database:/app/database
      - median_logs:/app/logs
      - ./watched:/app/watched
    expose:
      - "5000"
    networks:
      - median_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: median_nginx
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      median:
        condition: service_healthy
    networks:
      - median_net

volumes:
  median_downloads:
  median_backups:
  median_database:
  median_logs:

networks:
  median_net:
    driver: bridge
