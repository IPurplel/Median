worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - "$request" $status $body_bytes_sent "$http_referer"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Connection pooling upstream
    upstream median_backend {
        server median:5000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;

        # Increase upload/download size limits
        client_max_body_size 0;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Static file caching
        location ~* \.(css|js|svg|png|jpg|ico|woff2?)$ {
            proxy_pass http://median_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            expires 1d;
            add_header Cache-Control "public, no-transform";
        }

        # API — no caching
        location /api/ {
            proxy_pass http://median_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";

            # SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Cache-Control no-cache;
        }

        # Frontend SPA
        location / {
            proxy_pass http://median_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
        }
    }
}
